name: ダッシュボード自動更新

# 実行タイミング（東証の取引時間 9:00〜15:30 日本時間 = 0:00〜6:30 UTC の間、平日のみ）
# 1. 30分おき: ウォッチリスト銘柄の詳細ダッシュボードを更新
# 2. 2時間おき（9:01, 11:01, 13:01, 15:01 日本時間）: 東証上場の内国株式ほぼ全銘柄
#    （プライム・スタンダード・グロース、約3,700銘柄）を対象にした買い候補スキャンも実行
# 3. GitHubの画面から手動でも実行できる（Actionsタブ→このワークフロー→Run workflow）
on:
  schedule:
    - cron: "*/30 0-6 * * 1-5"
    - cron: "1 0,2,4,6 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 必要なライブラリをインストール
        working-directory: scripts
        run: pip install -r requirements.txt

      - name: 全銘柄スキャンを実行するタイミングか判定
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_scan=true" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event.schedule }}" = "1 0,2,4,6 * * 1-5" ]; then
            echo "run_scan=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_scan=false" >> "$GITHUB_OUTPUT"
          fi

      - name: 前回の全銘柄スキャン結果・銘柄一覧をキャッシュから復元
        uses: actions/cache/restore@v4
        with:
          path: |
            scripts/data_j.xls
            scripts/market_candidates.json
          key: market-scan-${{ github.run_id }}
          restore-keys: |
            market-scan-

      - name: 全上場銘柄（国内株式ほぼ全て）をスキャン
        if: steps.decide.outputs.run_scan == 'true'
        working-directory: scripts
        run: python market_scan.py

      - name: 全銘柄スキャン結果・銘柄一覧をキャッシュに保存
        if: steps.decide.outputs.run_scan == 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            scripts/data_j.xls
            scripts/market_candidates.json
          key: market-scan-${{ github.run_id }}

      - name: ダッシュボードを生成（公開ビルド・保有銘柄情報は含めない）
        working-directory: scripts
        env:
          PUBLIC_BUILD: "1"
        run: python dashboard.py

      - name: 公開用フォルダを準備
        run: |
          mkdir -p public
          cp scripts/dashboard.html public/index.html

      - name: GitHub Pages用にアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: GitHub Pagesへ公開
        id: deployment
        uses: actions/deploy-pages@v4
